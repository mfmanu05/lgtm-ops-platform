server {

    listen 80;

    location / {

        root /usr/share/nginx/html;
        index index.html;

        try_files $uri /index.html;
    }

    location /grafana/ {

        proxy_pass http://grafana:3000/;

	proxy_http_version 1.1;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;
    }


    location /api/ {

        proxy_pass http://backend:3000/api/;

        proxy_http_version 1.1;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;
    }

}
