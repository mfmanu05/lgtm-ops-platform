server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc: "distributor:4317"
        http: "distributor:4318"

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/traces

overrides:
  defaults:
    metrics_generator:
      processors: []
compactor:
  compaction:
    block_retention: 336h # 14 dias (padrão)