server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc: "distributor:4317"
        http: "distributor:4318"

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/traces

overrides:
  defaults:
    metrics_generator:
      processors: []


compactor:
  compaction:
    block_size_bytes: 524288000          # 500MB (blocos menores para não sobrecarregar I/O local)
    compacted_block_retention: 1h
    compaction_window: 1h
  retention_tables:
    v2:
      # Escolha o tempo ideal para o seu disco (ex: 48h, 72h, 7d)
      block_retention: 72h               
  ring:
    kvstore:
      store: memberlist
