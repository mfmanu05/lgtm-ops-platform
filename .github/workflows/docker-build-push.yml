name: Build and Push Images

on:
  push:
    branches:
      - main


jobs:

  build:

    runs-on: ubuntu-latest

    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4



      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Verify DockerHub username
        run: |
          echo "DockerHub user: ${{ vars.DOCKERHUB_USERNAME }}"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./app/backend
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/lgtm-backend:latest
            ${{ vars.DOCKERHUB_USERNAME }}/lgtm-backend:${{ github.sha }}



      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./app/frontend
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/lgtm-frontend:latest
            ${{ vars.DOCKERHUB_USERNAME }}/lgtm-frontend:${{ github.sha }}
